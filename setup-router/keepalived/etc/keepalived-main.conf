global_defs {
  # 邮件通知说明：
  # - notify-state.sh 使用系统 mail 命令发送通知。
  # - SMTP/SSL/465 账号、密码、服务器等鉴权信息只配置在系统 /etc/msmtprc 的 default 账号中，
  #   不放在 keepalived.conf 或 /etc/keepalived 目录里。
  # - 收件人等非鉴权项可参考 /etc/keepalived/mail.env.example。
  notification_email {
    # admin@example.com
  }
  # max_auto_priority           # 启用自动优先级管理
  script_user root
  enable_script_security
  router_id LVS_DEVEL
  vrrp_skip_check_adv_addr
}

vrrp_script chk_haproxy {
  #script "pidof haproxy" # 替换为要检测的进程
  script "/bin/bash -l -c 'ss -lanp | grep LISTEN | grep :6443'" # 替换为要检测的端口
  interval 60
  weight 2
}

vrrp_instance haproxy-vip-v4 {
  state MASTER # 主节点
  priority 121
  interface eth0 # 网络接口
  virtual_router_id 60
  advert_int 1
  authentication {
    auth_type PASS
    auth_pass 1111
  }
  unicast_src_ip 172.16.0.2 # 本机IP地址
  unicast_peer {
    172.16.0.3  # 所有对端IP
  }

  virtual_ipaddress {
    172.16.0.10/24  # VIP地址
  }

  track_script {
    chk_haproxy
  }

  # 状态切换触发脚本：
  # - MASTER: 记录主节点状态，并启动 kea-dhcp4/kea-dhcp6
  # - BACKUP/FAULT/STOP: 记录非主状态，并停止 kea-dhcp4/kea-dhcp6
  # 外部定时任务可调用 /etc/keepalived/is-master.sh 判断当前是否为主节点。
  notify_master "/bin/bash /etc/keepalived/notify-state.sh MASTER"
  notify_backup "/bin/bash /etc/keepalived/notify-state.sh BACKUP"
  notify_fault "/bin/bash /etc/keepalived/notify-state.sh FAULT"
  notify_stop "/bin/bash /etc/keepalived/notify-state.sh STOP"
}

vrrp_instance haproxy-vip-v6 {
  state MASTER # 主节点
  priority 121
  interface eth0 # 网络接口
  virtual_router_id 61
  advert_int 1
  native_ipv6
  authentication {
    auth_type PASS
    auth_pass 1111
  }
  unicast_src_ip fd08::ac10:0:0:0:02 # 本机IP地址
  unicast_peer {
    fd08::ac10:0:0:0:03  # 所有对端IP
  }

  virtual_ipaddress {
    fd08::ac10:0:0:0:0a/64
  }

  track_script {
    chk_haproxy
  }
}
