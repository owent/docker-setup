# Persistent cache and stale response policy.
# Reference values are aligned with setup-router/dns/unbound-etc/unbound.conf.
cache-size 1048576
cache-persist yes
cache-file /var/lib/smartdns/smartdns.cache
cache-checkpoint-time 7200
rr-ttl-min 30
rr-ttl-max 86400
prefetch-domain yes
serve-expired yes
serve-expired-ttl 259200
serve-expired-reply-ttl 20
serve-expired-prefetch-time 21600
