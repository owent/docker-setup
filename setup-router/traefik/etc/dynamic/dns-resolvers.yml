# ============================================================================
# Traefik 动态配置 — 自定义 DNS 解析器说明
# ============================================================================
# Traefik 本身的服务发现使用系统 DNS 或 providers (Docker/K8s/File)。
# 若需要让后端地址通过指定的 nameserver 解析而非系统 DNS，
# 有以下方案:
#
# 方案1: 容器启动时指定 DNS (推荐)
#   在 create-traefik-pod.sh 中设置环境变量:
#     TRAEFIK_DNS=(119.29.29.29 223.5.5.5 "2402:4e00::1")
#   脚本会自动将其转换为 podman --dns 参数，覆盖容器的 /etc/resolv.conf
#
# 方案2: 使用 ACME DNS challenge 的 resolvers (仅影响 ACME 证书验证)
#   在 traefik.yml 的 certificatesResolvers 中配置:
#     dnsChallenge:
#       resolvers:
#         - "119.29.29.29:53"
#         - "223.5.5.5:53"
#
# 方案3: host 网络模式下修改宿主机 /etc/resolv.conf
#   nameserver 119.29.29.29
#   nameserver 223.5.5.5
#   nameserver 2402:4e00::1
#
# ============================================================================

# 本文件不包含 Traefik 动态路由配置，仅作为 DNS 配置参考文档。
# 实际的 DNS 设置请在 create-traefik-pod.sh 启动脚本中配置。
