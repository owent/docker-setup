{
    "Control-agent": {
        "http-host": "0.0.0.0",
        "http-port": 8000,
        "control-sockets": {
            "dhcp4": {
                "socket-type": "unix",
                "socket-name": "/run/kea/control_socket_4"
            }
        },
        "authentication": {
        "type": "basic",
        "realm": "Kea Control Agent",
        "directory": "/etc/kea",
        "clients": [
            {
                "user": "kea-ha-peer1",
                "password": "secret-for-server1"
            },
            {
                "user": "kea-ha-peer2",
                "password": "secret-for-server2"
            }
          ]
        },
        
        "cert-file": "/etc/kea/server.crt",
        "key-file": "/etc/kea/server.key",
        "trust-anchor": "/etc/kea/ca.crt",
        "cert-required": true,
        "loggers": [
            {
                "name": "kea-ctrl-agent",
                "output_options": [
                    {
                        "output": "stdout"
                    }
                ],
                "severity": "INFO"
            }
        ]
    }
}
