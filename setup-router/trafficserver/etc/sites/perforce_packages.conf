# package.perforce.com 缓存策略
#
# Perforce 包仓库，提供 RPM/DEB 包及仓库元数据
# URL 格式:
#   /yum/rhel/<version>/<arch>/<packages>.rpm
#   /apt/ubuntu/pool/<comp>/<pkg>/<files>.deb
#   /yum/rhel/<version>/<arch>/repodata/ (元数据)
#   /apt/ubuntu/dists/<codename>/ (元数据)
#
# ATS header_rewrite 语法:
#   条件: cond %{CLIENT-URL:PATH} /regex/
#   操作: set-header <name> <value>
#
# 缓存策略:
#   - 包文件 (.rpm, .deb): 版本化不可变，长缓存 (7天)
#   - GPG 密钥 (.gpg, .key, .asc): 中缓存 (7天)
#   - 仓库元数据 (repodata/, Release, Packages): 短缓存 (2小时)
#   - 其他: 短缓存 (6小时)

# ==============================================================================
# 阶段1: REMAP 阶段 - 启用缓存配置
# ==============================================================================
# 所有请求启用缓存
cond %{CLIENT-URL:PATH} /.*/
  set-config proxy.config.http.cache.http 1
  set-config proxy.config.http.cache.cache_responses_to_cookies 1

# ==============================================================================
# 阶段2: READ_RESPONSE_HDR_HOOK - 修改响应头添加 Cache-Control
# ==============================================================================

# ------------------------------------------------------------------------------
# 包文件 (.rpm, .deb) - 版本化不可变 - 7天缓存
# ------------------------------------------------------------------------------
cond %{READ_RESPONSE_HDR_HOOK}
cond %{CLIENT-URL:PATH} /\.(rpm|deb)$/
  set-header Cache-Control "public, max-age=604800"

# ------------------------------------------------------------------------------
# GPG 密钥文件 (.gpg, .key, .asc) - 中缓存 7天
# ------------------------------------------------------------------------------
cond %{READ_RESPONSE_HDR_HOOK}
cond %{CLIENT-URL:PATH} /\.(gpg|key|asc)$/
  set-header Cache-Control "public, max-age=604800"

# ------------------------------------------------------------------------------
# 仓库元数据 - 短缓存 2小时
# YUM: repodata/repomd.xml, repodata/*.xml.gz 等
# APT: Release, InRelease, Packages, Packages.gz, Sources 等
# ------------------------------------------------------------------------------
cond %{READ_RESPONSE_HDR_HOOK}
cond %{CLIENT-URL:PATH} /(repodata\/|\/Release|\/InRelease|\/Packages|\/Sources)/
  set-header Cache-Control "public, max-age=7200"

# ------------------------------------------------------------------------------
# 其他内容 - 默认 6小时缓存
# ------------------------------------------------------------------------------
cond %{READ_RESPONSE_HDR_HOOK}
cond %{CLIENT-URL:PATH} /\.(rpm|deb)$/ [NOT]
cond %{CLIENT-URL:PATH} /\.(gpg|key|asc)$/ [NOT]
cond %{CLIENT-URL:PATH} /(repodata\/|\/Release|\/InRelease|\/Packages|\/Sources)/ [NOT]
  set-header Cache-Control "public, max-age=21600"
