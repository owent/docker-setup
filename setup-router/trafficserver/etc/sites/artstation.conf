# ArtStation 主站 (www.artstation.com) 缓存策略
#
# 服务特征:
#   - 艺术家作品展示平台，HTML + API + 静态资源混合
#   - 用户登录后页面包含个性化内容 (点赞状态、关注列表、通知数等)
#   - /assets/ 下的 JS/CSS/字体文件名可能不含版本 hash，ArtStation 升级时可能复用
#   - /api/ 端点返回动态 JSON，不应缓存
#   - 认证端点 (/users/sign_in, /oauth 等) 不应缓存
#
# "地址不变内容变"风险分析:
#   - /assets/ 下的 JS/CSS/字体: 文件名可能无版本号，升级时可能复用 → 7天缓存
#   - 页面 HTML: 含动态内容（点赞数、评论数等）→ 短缓存
#
# 策略:
#   1. 带 Cookie/Authorization 的请求默认不缓存 (引用 bypass_auth.conf)
#   2. 静态资源路径 (/assets/, *.js, *.css 等) 不受 Cookie 影响，重新启用缓存
#   3. 设置适当的 Cache-Control 头控制浏览器和 ATS 缓存行为
#
# 注意: 此配置应与 cache.config 中的 artstation 规则配合使用

# ==============================================================================
# 阶段1: REMAP 阶段 - 静态资源重新启用缓存
# ==============================================================================
# 当请求路径匹配静态资源时，覆盖 bypass_auth.conf 的禁用，重新启用缓存
# /assets/ 目录下的 JS/CSS/字体/图片等静态资源
cond %{CLIENT-URL:PATH} /^\/assets\//
  set-config proxy.config.http.cache.http 1
  set-config proxy.config.http.cache.cache_responses_to_cookies 1

# 根路径或其他目录下的静态文件后缀
cond %{CLIENT-URL:PATH} /\.(js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|webp|ico)(\?.*)?$/
  set-config proxy.config.http.cache.http 1
  set-config proxy.config.http.cache.cache_responses_to_cookies 1

# ==============================================================================
# 阶段2: READ_RESPONSE_HDR_HOOK - 设置 Cache-Control 响应头
# ==============================================================================

# ------------------------------------------------------------------------------
# 静态资源 - 中等缓存 7天 (存在版本升级复用风险，不设置过长)
# ------------------------------------------------------------------------------
cond %{READ_RESPONSE_HDR_HOOK}
cond %{CLIENT-URL:PATH} /^\/assets\//
  set-header Cache-Control "public, max-age=604800"

cond %{READ_RESPONSE_HDR_HOOK}
cond %{CLIENT-URL:PATH} /\.(js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|webp|ico)(\?.*)?$/
  set-header Cache-Control "public, max-age=604800"
